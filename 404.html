<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Local Praxis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0A0A'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Archivo Black,Impact,sans-serif' font-size='14' font-weight='900' fill='%23D8DBD0'>LP</text></svg>">
  <meta name="theme-color" content="#D8DBD0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #D8DBD0;
      --ink: #0A0A0A;
      --red: #C8342E;
      --font-display: 'Archivo Black', Impact, 'Helvetica Neue Condensed Black', sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-mono);
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .four04 {
      font-family: var(--font-display);
      font-size: 30vw;
      color: var(--ink);
      line-height: 0.84;
      letter-spacing: -0.045em;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      user-select: none;
      text-transform: uppercase;
    }
    .meta {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      line-height: 1.8;
      text-align: right;
    }
    .meta a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
      transition: background-color 0.1s ease, color 0.1s ease;
    }
    .meta a:hover {
      background-color: var(--ink);
      color: var(--paper);
    }
    @media (max-width: 480px) {
      .meta { bottom: 1.25rem; right: 1.25rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="four04">404</div>
  <div class="meta">System fault<br><a href="/">Return to origin.</a></div>
</body>
</html>
